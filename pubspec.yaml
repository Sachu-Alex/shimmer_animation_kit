name: shimmer_animation_kit
description: >-
  A Flutter package providing shimmer loading animations with auto shape
  detection, synchronized animation scope, manual widgets, theming, and
  full accessibility support.
version: 0.2.0
homepage: https://github.com/seqato/shimmer_animation_kit
repository: https://github.com/seqato/shimmer_animation_kit
issue_tracker: https://github.com/seqato/shimmer_animation_kit/issues
documentation: https://pub.dev/documentation/shimmer_animation_kit/latest/

topics:
  - animation
  - shimmer
  - loading
  - skeleton
  - ui

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
